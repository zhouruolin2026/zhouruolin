<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏓 乒乓球</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f23; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #fff; overflow: hidden; }
    canvas { border: 2px solid #00d4aa; border-radius: 8px; background: #1a1a2e; }
    #controls { margin-top: 8px; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; background: #2a2a4a; color: #00d4aa; font-size: 12px; }
  </style>
</head>
<body>
  <canvas id="c" width="300" height="400"></canvas>
  <div id="controls">
    <button class="btn" onclick="start()">开始</button>
    <button class="btn" onclick="pause()">暂停</button>
    <button class="btn" onclick="restart()">重置</button>
  </div>
  <script>
    const c = document.getElementById('c'), ctx = c.getContext('2d');
    let x=150,y=200,dx=3,dy=3,p1y=160,p2y=160,pw=80,score=0,running=0,paused=0;
    function draw(){ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,300,400);ctx.setLineDash([10,10]);ctx.strokeStyle='#333';ctx.beginPath();ctx.moveTo(150,0);ctx.lineTo(150,400);ctx.stroke();ctx.setLineDash([]);ctx.beginPath();ctx.arc(x,y,8,0,7);ctx.fillStyle='#00d4aa';ctx.fill();ctx.fillStyle='#4caf50';ctx.fillRect(10,p1y,8,pw);ctx.fillStyle='#f44336';ctx.fillRect(282,p2y,8,pw);ctx.fillStyle='#fff';ctx.font='14px sans-serif';ctx.fillText('得分: '+score,10,20);}
    function move(){if(!running)return;x+=dx;y+=dy;if(y<8||y>392)dy=-dy;if(x<18&&y>p1y&&y<p1y+pw)dx=-dx;if(x>282&&y>p2y&&y<p2y+pw)dx=-dx;if(x<10||x>290){running=0;ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,300,400);ctx.fillStyle='#f44336';ctx.font='24px sans-serif';ctx.textAlign='center';ctx.fillText('游戏结束',150,200);ctx.fillStyle='#fff';ctx.font='16px sans-serif';ctx.fillText('得分: '+score,150,230);return}if(y>p2y+pw/2)p2y+=3;else p2y-=3;if(p2y<0)p2y=0;if(p2y>320)p2y=320;draw();requestAnimationFrame(move);}
    function start(){if(!running&&!paused){running=1;move()}}
    function pause(){if(running){paused=1;running=0;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,300,400);ctx.fillStyle='#ffeb3b';ctx.font='30px sans-serif';ctx.textAlign='center';ctx.fillText('暂停',150,200);}}
    function restart(){running=0;paused=0;x=150;y=200;dx=3;dy=3;p1y=160;score=0;draw()}
    let t=0;c.ontouchstart=e=>{t=1};c.ontouchmove=e=>{if(t){p1y=e.touches[0].clientY-c.getBoundingClientRect().top-pw/2;if(p1y<0)p1y=0;if(p1y>320)p1y=320}};c.ontouchend=e=>{t=0};
    document.onkeydown=e=>{if(e.key=='ArrowUp'&&p1y>0)p1y-=20;if(e.key=='ArrowDown'&&p1y<320)p1y+=20;if(e.key==' ')start()};
    draw();
  </script>
</body>
</html>
