<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧱 打砖块</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f23; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #fff; overflow: hidden; padding: 12px; }
    .game-shell { width: min(390px, 100vw); display: flex; flex-direction: column; align-items: center; }
    canvas { width: min(360px, 92vw); height: auto; max-height: 70vh; border: 2px solid #00d4aa; border-radius: 8px; background: #1a1a2e; }
    #controls { margin-top: 10px; width: min(360px, 92vw); display: flex; gap: 8px; }
    .btn { flex: 1; padding: 11px 12px; border: none; border-radius: 8px; background: #2a2a4a; color: #00d4aa; font-size: 14px; }
  </style>
</head>
<body>
  <div class="game-shell">
    <canvas id="c" width="300" height="400"></canvas>
    <div id="controls">
      <button class="btn" id="startBtn" onclick="start()">开始</button>
      <button class="btn" id="resetBtn" onclick="reset()">重置</button>
    </div>
  </div>
  <script>
    const c = document.getElementById('c'), ctx = c.getContext('2d');
    let x = 150, y = 350, dx = 3, dy = -3, r = 8, pw = 80, px = 110, score = 0, running = 0;
    const bricks = [], rows = 5, cols = 6, colors = ['#f44336','#ff9800','#ffeb3b','#4caf50','#2196f3'];
    for(let i=0;i<rows;i++){bricks[i]=[];for(let j=0;j<cols;j++)bricks[i][j]={x:0,y:0,s:1}}
    function draw(){
      ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,300,400);
      for(let i=0;i<rows;i++)for(let j=0;j<cols;j++)if(bricks[i][j].s){ctx.fillStyle=colors[i];ctx.fillRect(j*50+5,i*25+5,45,20);bricks[i][j].x=j*50+5;bricks[i][j].y=i*25+5}
      ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fillStyle='#00d4aa';ctx.fill();
      ctx.fillStyle='#00d4aa';ctx.fillRect(px,390,pw,8);
      ctx.fillStyle='#fff';ctx.font='14px sans-serif';ctx.fillText('分:'+score,10,20);
    }
    function move(){if(!running)return;x+=dx;y+=dy;
      if(x<r||x>300-r)dx=-dx;
      if(y<r)dy=-dy;
      let hitBrick=0;
      for(let i=0;i<rows;i++){
        for(let j=0;j<cols;j++){
          if(bricks[i][j].s&&x>bricks[i][j].x&&x<bricks[i][j].x+45&&y>bricks[i][j].y&&y<bricks[i][j].y+20){
            bricks[i][j].s=0;score+=10;hitBrick=1;break;
          }
        }
        if(hitBrick)break;
      }
      if(hitBrick)dy=-dy;
      if(y>392-r){if(x>px&&x<px+pw){dy=-dy;dx=(x-px-pw/2)/5}else if(y>400){running=0;ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,300,400);ctx.fillStyle='#f44336';ctx.font='24px sans-serif';ctx.textAlign='center';ctx.fillText('游戏结束',150,200);ctx.fillStyle='#fff';ctx.font='16px sans-serif';ctx.fillText('得分: '+score,150,230);return}}
      draw();requestAnimationFrame(move);
    }
    function start(){if(!running){running=1;move()}}
    function reset(){running=0;x=150;y=350;dx=3;dy=-3;score=0;for(let i=0;i<rows;i++)for(let j=0;j<cols;j++)bricks[i][j].s=1;draw()}
    let t=0;c.ontouchstart=e=>{t=1;e.preventDefault()};c.ontouchmove=e=>{if(t){px=e.touches[0].clientX-c.getBoundingClientRect().left-pw/2;if(px<0)px=0;if(px>220)px=220;e.preventDefault()}};c.ontouchend=e=>{t=0};
    document.onkeydown=e=>{if(e.key=='ArrowLeft'&&px>0)px-=20;if(e.key=='ArrowRight'&&px<220)px+=20;if(e.key==' ')start()};
    draw();
  </script>
</body>
</html>
