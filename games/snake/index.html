<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐍 贪吃蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f23;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #eee;
      overflow: hidden;
      padding: 12px;
    }
    .game-shell { width: min(390px, 100vw); display: flex; flex-direction: column; align-items: center; }
    canvas {
      width: min(360px, 92vw);
      height: auto;
      max-height: 70vh;
      border: 2px solid #00d4aa;
      border-radius: 8px;
      background: #1a1a2e;
    }
    #mainControls {
      margin-top: 10px;
      width: min(380px, 96vw);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    #controls {
      margin-top: 8px;
      width: min(380px, 96vw);
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }
    .btn {
      width: 100%;
      height: 38px;
      border: none;
      border-radius: 10px;
      background: #2a2a4a;
      color: #00d4aa;
      font-size: 17px;
      font-weight: 700;
    }
    .dpad-row { display: flex; gap: 8px; }
    .dpad-btn {
      width: 74px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: #2a2a4a;
      color: #00d4aa;
      font-size: 18px;
    }
    #score {
      margin-bottom: 8px;
      font-size: 18px;
      color: #00d4aa;
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <div id="score">得分: <span>0</span></div>
    <canvas id="c" width="300" height="450"></canvas>
    <div id="mainControls">
      <button class="btn" id="startBtn" aria-label="开始" onclick="start()">⏻</button>
      <button class="btn" id="pauseBtn" aria-label="暂停" onclick="pauseGame()">⏸</button>
      <button class="btn" id="restartBtn" aria-label="重开" onclick="restartGame()">↺</button>
    </div>
    <div id="controls">
      <div class="dpad-row">
        <button class="dpad-btn" id="upBtn" aria-label="上" onclick="setDirection(0,-1)">▲</button>
      </div>
      <div class="dpad-row">
        <button class="dpad-btn" id="leftBtn" aria-label="左" onclick="setDirection(-1,0)">◀</button>
        <button class="dpad-btn" id="downBtn" aria-label="下" onclick="setDirection(0,1)">▼</button>
        <button class="dpad-btn" id="rightBtn" aria-label="右" onclick="setDirection(1,0)">▶</button>
      </div>
    </div>
  </div>
  <script>
    const c = document.getElementById('c'), ctx = c.getContext('2d');
    const CELL = 15, COLS = 20, ROWS = 30;
    let snake = [], dir = {x:1,y:0}, food = {x:5,y:5}, score = 0, running = 0, paused = 0;
    function init() {
      snake = [[10,15],[10,16],[10,17]];
      dir = {x:1,y:0};
      score = 0;
      document.querySelector('#score span').textContent = 0;
      placeFood();
    }
    function placeFood() {
      food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
      while(snake.some(s=>s[0]==food.x&&s[1]==food.y)) food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
    }
    function draw() {
      ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,300,450);
      ctx.fillStyle='#ff4757';ctx.fillRect(food.x*CELL+1,food.y*CELL+1,CELL-2,CELL-2);
      snake.forEach((s,i)=>{ctx.fillStyle=i?`hsl(${130+i*5},70%,50%)`:'#00d4aa';ctx.fillRect(s[0]*CELL+1,s[1]*CELL+1,CELL-2,CELL-2)});
    }
    function step() {
      if(!running||paused)return;
      const h=[snake[0][0]+dir.x,snake[0][1]+dir.y];
      if(h[0]<0||h[0]>=COLS||h[1]<0||h[1]>=ROWS||snake.some(s=>s[0]==h[0]&&s[1]==h[1])){running=0;paused=0;ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,300,450);ctx.fillStyle='#f44336';ctx.font='30px sans-serif';ctx.textAlign='center';ctx.fillText('游戏结束',150,200);ctx.fillStyle='#fff';ctx.font='16px sans-serif';ctx.fillText('得分: '+score,150,240);return}
      snake.unshift(h);
      if(h[0]==food.x&&h[1]==food.y){score+=10;document.querySelector('#score span').textContent=score;placeFood();}else snake.pop();
      draw();setTimeout(step,150);
    }
    function start(){if(!running){init();running=1;paused=0;step();}else if(paused){paused=0;step();}}
    function pauseGame(){if(running)paused=paused?0:1;if(running&&!paused)step();}
    function restartGame(){running=0;paused=0;init();draw();}
    function setDirection(nx, ny){
      if((nx!==0&&dir.x!==0)||(ny!==0&&dir.y!==0)) return;
      dir = {x:nx,y:ny};
      if(!running) start();
    }
    document.onkeydown=e=>{if(e.key=='ArrowLeft'&&!dir.x)dir={x:-1,y:0};if(e.key=='ArrowRight'&&!dir.x)dir={x:1,y:0};if(e.key=='ArrowUp'&&!dir.y)dir={x:0,y:-1};if(e.key=='ArrowDown'&&!dir.y)dir={x:0,y:1};if(e.key==' ')start()};
    let sx,sy;c.ontouchstart=e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY};c.ontouchend=e=>{let dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)){if(dx>30)dir={x:1,y:0};else if(dx<-30)dir={x:-1,y:0}}else{if(dy>30)dir={x:0,y:1};else if(dy<-30)dir={x:0,y:-1}}if(!running)start()};
    window.__snakeState=()=>({running,paused,score,dir:{x:dir.x,y:dir.y},head:{x:snake[0][0],y:snake[0][1]}});
    init();draw();
  </script>
</body>
</html>
