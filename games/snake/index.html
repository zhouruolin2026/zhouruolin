<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐍 贪吃蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f23;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
      color: #eee;
      overflow: hidden;
    }
    canvas {
      border: 2px solid #00d4aa;
      border-radius: 8px;
      background: #1a1a2e;
    }
    #controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #2a2a4a;
      color: #00d4aa;
      font-size: 14px;
    }
    #score {
      margin-bottom: 8px;
      font-size: 18px;
      color: #00d4aa;
    }
  </style>
</head>
<body>
  <div id="score">得分: <span>0</span></div>
  <canvas id="c" width="300" height="450"></canvas>
  <div id="controls">
    <button class="btn" onclick="start()">开始</button>
  </div>
  <script>
    const c = document.getElementById('c'), ctx = c.getContext('2d');
    const CELL = 15, COLS = 20, ROWS = 30;
    let snake = [], dir = {x:1,y:0}, food = {x:5,y:5}, score = 0, running = 0;
    function init() {
      snake = [[10,15],[10,16],[10,17]];
      dir = {x:1,y:0};
      score = 0;
      document.querySelector('#score span').textContent = 0;
      placeFood();
    }
    function placeFood() {
      food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
      while(snake.some(s=>s[0]==food.x&&s[1]==food.y)) food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
    }
    function draw() {
      ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,300,450);
      ctx.fillStyle='#ff4757';ctx.fillRect(food.x*CELL+1,food.y*CELL+1,CELL-2,CELL-2);
      snake.forEach((s,i)=>{ctx.fillStyle=i?`hsl(${130+i*5},70%,50%)`:='#00d4aa';ctx.fillRect(s[0]*CELL+1,s[1]*CELL+1,CELL-2,CELL-2)});
    }
    function step() {
      if(!running)return;
      const h=[snake[0][0]+dir.x,snake[0][1]+dir.y];
      if(h[0]<0||h[0]>=COLS||h[1]<0||h[1]>=ROWS||snake.some(s=>s[0]==h[0]&&s[1]==h[1])){running=0;ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,300,450);ctx.fillStyle='#f44336';ctx.font='30px sans-serif';ctx.textAlign='center';ctx.fillText('游戏结束',150,200);ctx.fillStyle='#fff';ctx.font='16px sans-serif';ctx.fillText('得分: '+score,150,240);return}
      snake.unshift(h);
      if(h[0]==food.x&&h[1]==food.y){score+=10;document.querySelector('#score span').textContent=score;placeFood();}else snake.pop();
      draw();setTimeout(step,150);
    }
    function start(){if(running)return;init();running=1;step();}
    document.onkeydown=e=>{if(e.key=='ArrowLeft'&&!dir.x)dir={x:-1,y:0};if(e.key=='ArrowRight'&&!dir.x)dir={x:1,y:0};if(e.key=='ArrowUp'&&!dir.y)dir={x:0,y:-1};if(e.key=='ArrowDown'&&!dir.y)dir={x:0,y:1};if(e.key==' ')start()};
    let sx,sy;c.ontouchstart=e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY};c.ontouchend=e=>{let dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)){if(dx>30)dir={x:1,y:0};else if(dx<-30)dir={x:-1,y:0}}else{if(dy>30)dir={x:0,y:1};else if(dy<-30)dir={x:0,y:-1}}if(!running)start()};
    init();draw();
  </script>
</body>
</html>
