<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小鱼冻干的游戏乐园</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f23; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }
    .hall { width: min(390px, 100vw); }
    .contact { font-size: 0.9rem; color: #d5d5d5; margin-bottom: 14px; text-align: center; line-height: 1.6; }
    h1 { font-size: 1.8rem; color: #00d4aa; margin-bottom: 20px; text-align: center; }
    .game-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .game-card { background: #1a1a2e; border: 2px solid #2a2a4a; border-radius: 12px; padding: 18px 10px; text-align: center; cursor: pointer; transition: all 0.3s; text-decoration: none; color: #fff; min-height: 132px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .game-card:hover { border-color: #00d4aa; transform: translateY(-3px); }
    .game-icon { font-size: 36px; margin-bottom: 10px; }
    .game-title { font-size: 1rem; font-weight: 600; }
    .game-desc { font-size: 0.75rem; color: #888; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="hall">
    <div class="contact">我在等你 电话：15303739551（微信同号） 邮箱：zhouruolin202603@126.com</div>
    <h1>🎮 游戏大厅</h1>
    <div class="game-list">
      <a href="games/snake/" class="game-card"><div class="game-icon">🐍</div><div class="game-title">贪吃蛇</div><div class="game-desc">经典益智</div></a>
      <a href="games/tetris/" class="game-card"><div class="game-icon">🧱</div><div class="game-title">俄罗斯方块</div><div class="game-desc">消除方块</div></a>
      <a href="games/breakout/" class="game-card"><div class="game-icon">🧱</div><div class="game-title">打砖块</div><div class="game-desc">弹球打砖</div></a>
      <a href="games/2048/" class="game-card"><div class="game-icon">🎯</div><div class="game-title">2048</div><div class="game-desc">数字合成</div></a>
      <a href="games/pingpong/" class="game-card"><div class="game-icon">🏓</div><div class="game-title">乒乓球</div><div class="game-desc">对战电脑</div></a>
      <a href="games/flappy/" class="game-card"><div class="game-icon">🐦</div><div class="game-title">跳跳鸟</div><div class="game-desc">虐心跳跃</div></a>
    </div>
  </div>
</body>
</html>
